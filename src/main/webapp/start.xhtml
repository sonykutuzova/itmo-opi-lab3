<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

<h:head>
    <title>Стартовая страница</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<!--    <link rel="stylesheet" href="#{request.contextPath}/stylestart.css"/>-->
    <h:outputStylesheet library="css" name="stylestart.css"/>

</h:head>

<h:body>
    <div class="container">
        <table class="main-container">
            <tr>
                <td colspan="2">
                    <div class="header">
                        Кутузова Софья, P3210, Вариант 466441
                    </div>
                </td>
            </tr>
        </table>

        <div id="clock">
            <div id="time" class="glow"></div>

            <div id="date">
                <span class="month"></span>
                <span class="day"></span>,
                <span class="year"></span>
            </div>

        </div>

        <div class="container">
            <ul id="days">
                <li class="monday">Mon</li>
                <li class="tuesday">Tues</li>
                <li class="wednesday">Wed</li>
                <li class="thursday">Thurs</li>
                <li class="friday">Fri</li>
                <li class="saturday">Sat</li>
                <li class="sunday">Sun</li>
            </ul>
        </div>

<!--        <a href="main.xhtml" class="nav-link">Начать </a>-->
            <h:form>
                <h:commandLink value="Начать" action="main" styleClass="nav-link">
                    <f:ajax disabled="true"/>
                </h:commandLink>
            </h:form>


    </div>

<!--    <script src="#{request.contextPath}/scriptstart.js"></script>-->
    <h:outputScript library="js" name="scriptstart.js"/>

</h:body>
</html>
