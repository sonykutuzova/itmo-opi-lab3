<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html PUBLIC "-//W3C//DTD XHTML 1.0 Transitional//EN"
        "http://www.w3.org/TR/xhtml1/DTD/xhtml1-transitional.dtd">
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="http://xmlns.jcp.org/jsf/html"
      xmlns:f="http://xmlns.jcp.org/jsf/core"
      xmlns:ui="http://xmlns.jcp.org/jsf/facelets">

<h:head>
    <title>#{msg['start.title']}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
    <h:outputStylesheet library="css" name="stylestart.css"/>

</h:head>

<h:body>
    <f:loadBundle basename="messages" var="msg"/>
    <div class="container">
        <table class="main-container">
            <tr>
                <td colspan="2">
                    <div class="header">
                        #{msg['app.header']}
                    </div>
                </td>
            </tr>
        </table>

        <div id="clock">
            <div id="time" class="glow"></div>

            <div id="date">
                <span class="month"></span>
                <span class="day"></span>,
                <span class="year"></span>
            </div>

        </div>

        <div class="container">
            <ul id="days">
                <li class="monday">#{msg['day.mon']}</li>
                <li class="tuesday">#{msg['day.tue']}</li>
                <li class="wednesday">#{msg['day.wed']}</li>
                <li class="thursday">#{msg['day.thu']}</li>
                <li class="friday">#{msg['day.fri']}</li>
                <li class="saturday">#{msg['day.sat']}</li>
                <li class="sunday">#{msg['day.sun']}</li>
            </ul>
        </div>

<!--        <a href="main.xhtml" class="nav-link">Начать </a>-->
            <h:form>
                <h:commandLink value="#{msg['start.button']}" action="main" styleClass="nav-link">
                    <f:ajax disabled="true"/>
                </h:commandLink>
            </h:form>


    </div>

    <h:outputScript library="js" name="scriptstart.js"/>

</h:body>
</html>
